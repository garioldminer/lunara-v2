<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0600" />
    <meta name="description" content="LUNARA - Your Mystic Companion" />
    
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>LUNARA</title>
    
    <style>
      /* ✅ სქროლის უფლება html და body-ზე */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        background: #0a0600;
      }
      
      /* ✅ #root-საც სქროლის უფლება */
      #root {
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Loading state */
      .initial-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #ffe566;
        font-family: Georgia, serif;
        font-size: 16px;
      }
      
      /* Global reset */
      * {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loading">✦ Loading...</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Global error handler -->
    <script>
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        document.getElementById('root').innerHTML = 
          '<div style="padding:20px;color:#ff6666;font-family:monospace;font-size:12px;">' +
          '<h3>❌ Error</h3>' +
          '<pre>' + (e.error?.message || e.message || 'Unknown error') + '</pre>' +
          '</div>';
      });
      
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
      });
    </script>
  </body>
</html>
